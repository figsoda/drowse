version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      nix:
        patterns: ["*"]
